<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OTIMAC - SISTEMA INTEGRAL</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="OTIMAC">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/708/708892.png">

    <style>
        :root { --primary: #1a1a1a; --accent: #fbc02d; --bg: #f0f2f5; --white: #ffffff; --danger: #d32f2f; --success: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        .hidden { display: none !important; }
        header { background: var(--primary); color: var(--accent); padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .content { padding: 15px; padding-bottom: 100px; max-width: 600px; margin: auto; }
        .card-box { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        #mic-btn { width: 70px; height: 70px; border-radius: 50%; border: none; background: var(--danger); color: white; font-size: 28px; cursor: pointer; box-shadow: 0 5px 15px rgba(211,47,47,0.3); margin-bottom: 10px; }
        .res-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .dest-name { font-weight: bold; text-transform: uppercase; font-size: 0.8rem; text-align: left; flex: 1; }
        .price-text { color: var(--success); font-weight: 800; font-size: 1.1rem; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 0.75rem; color: #666; font-weight: bold; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-accent { background: var(--accent); color: #000; }
        .user-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--primary); position: fixed; width: 100%; z-index: 2000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="background:#262626; padding:35px; border-radius:25px; width:85%; max-width:350px; text-align:center;">
            <h2 style="color:var(--accent)">OTIMAC</h2>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pin" placeholder="PIN">
            <button class="btn btn-accent" onclick="validar()">Ingresar</button>
            <p id="login-status" style="color:white; font-size:0.7rem; margin-top:10px;"></p>
        </div>
    </div>

    <div id="app" class="hidden">
        <header>TARIFARIO OTIMAC - SSC TSIAKHE</header>
        <div class="content">
            
            <div id="view-search">
                <div class="card-box">
                    <input type="text" id="manual-input" placeholder="Buscar destino..." oninput="ejecutarFiltro(this.value)">
                    <button id="mic-btn" onclick="iniciarVoz()">🎤</button>
                    <p id="heard" style="font-size:0.85rem; color:var(--danger); font-weight:bold;"></p>
                </div>
                <div id="lista-resultados"></div>
            </div>

            <div id="view-admin" class="hidden">
                <div class="card-box" style="text-align:left;">
                    <h3>Choferes (Lista Blanca)</h3>
                    <input type="text" id="new-u-name" placeholder="Nombre">
                    <input type="text" id="new-u-pin" placeholder="PIN">
                    <button class="btn btn-accent" onclick="gestionarNube('user-add')">Dar de Alta</button>
                    <div id="users-list-ui"></div>
                </div>

                <div class="card-box" style="text-align:left;">
                    <h3>Modificar Tarifas</h3>
                    <input type="text" id="new-r-dest" placeholder="Destino">
                    <input type="text" id="new-r-price" placeholder="Precio">
                    <button class="btn btn-accent" onclick="gestionarNube('route-add')">Guardar Cambio</button>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" onclick="showTab('search')"><span>🔍</span>BUSCAR</div>
            <div id="admin-nav" class="nav-item hidden" onclick="showTab('admin')"><span>⚙️</span>ADMIN</div>
            <div class="nav-item" onclick="location.reload()"><span>❌</span>SALIR</div>
        </nav>
    </div>

<script>
    // CONFIGURACIÓN DE NUBE (RELLENA ESTO)
    const CONFIG = {
        token: "TU_TOKEN_AQUÍ",
        user: "TU_USUARIO_GITHUB",
        repo: "TU_REPOSITORIO",
        path: "datos.json"
    };

    let NUBE_DATA = { usuarios: [], rutas: [] };
    const VOZ_FIX = {"crusto": "cruzto", "tlahui": "tlahuitepec"};

    async function fetchData() {
        const url = `https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`;
        try {
            const res = await fetch(url, { headers: { "Authorization": `token ${CONFIG.token}` } });
            const json = await res.json();
            NUBE_DATA = JSON.parse(atob(json.content));
            NUBE_DATA.sha = json.sha;
            return true;
        } catch (e) { return false; }
    }

    async function updateData() {
        const url = `https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`;
        const content = btoa(JSON.stringify(NUBE_DATA, null, 2));
        await fetch(url, {
            method: "PUT",
            headers: { "Authorization": `token ${CONFIG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update OTIMAC", content: content, sha: NUBE_DATA.sha })
        });
        await fetchData(); // Recargar SHA y datos
        renderAdmin();
    }

    async function validar() {
        document.getElementById('login-status').innerText = "Verificando Nube...";
        const ok = await fetchData();
        if(!ok) { alert("Error de conexión a GitHub"); return; }

        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pin').value.trim();
        const auth = NUBE_DATA.usuarios.find(x => x.u === u && x.p === p);

        if(auth) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            if(auth.r === 'admin') document.getElementById('admin-nav').classList.remove('hidden');
        } else alert("Bloqueado o datos incorrectos.");
    }

    function ejecutarFiltro(val) {
        const container = document.getElementById('lista-resultados');
        container.innerHTML = "";
        let t = val.toLowerCase().trim();
        for (let key in VOZ_FIX) if(t.includes(key)) t = t.replace(key, VOZ_FIX[key]);
        if(t.length < 2) return;

        NUBE_DATA.rutas.filter(r => r[0].toLowerCase().includes(t)).forEach(item => {
            container.innerHTML += `<div class="res-card"><span class="dest-name">${item[0]}</span><span class="price-text">${item[1]}</span></div>`;
        });
    }

    async function gestionarNube(accion, id = null) {
        if(accion === 'user-add') {
            NUBE_DATA.usuarios.push({ u: document.getElementById('new-u-name').value.toLowerCase(), p: document.getElementById('new-u-pin').value, r: 'user' });
        } else if(accion === 'user-del') {
            NUBE_DATA.usuarios.splice(id, 1);
        } else if(accion === 'route-add') {
            const d = document.getElementById('new-r-dest').value.toUpperCase();
            const p = document.getElementById('new-r-price').value;
            const idx = NUBE_DATA.rutas.findIndex(r => r[0] === d);
            if(idx > -1) NUBE_DATA.rutas[idx][1] = p; else NUBE_DATA.rutas.unshift([d, p]);
        }
        await updateData();
        alert("Nube Actualizada");
    }

    function renderAdmin() {
        const ui = document.getElementById('users-list-ui');
        ui.innerHTML = "";
        NUBE_DATA.usuarios.forEach((u, i) => {
            if(u.r !== 'admin') ui.innerHTML += `<div class="user-row"><span>${u.u}</span><button onclick="gestionarNube('user-del', ${i})">❌</button></div>`;
        });
    }

    function showTab(tab) {
        document.getElementById('view-search').classList.toggle('hidden', tab !== 'search');
        document.getElementById('view-admin').classList.toggle('hidden', tab !== 'admin');
        if(tab === 'admin') renderAdmin();
    }

    function iniciarVoz() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-MX';
        rec.onresult = (e) => { 
            const v = e.results[0][0].transcript; 
            document.getElementById('manual-input').value = v; 
            ejecutarFiltro(v); 
        };
        rec.start();
    }
</script>
</body>
</html>
