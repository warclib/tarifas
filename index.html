<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarifa de Viajes OTIMAC</title>
    <style>
        :root { --primary: #1a1a1a; --accent: #fbc02d; --bg: #f0f2f5; --white: #ffffff; --danger: #d32f2f; --success: #2e7d32; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: #333; }
        .hidden { display: none !important; }
        
        /* Login */
        #login-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--primary); }
        .login-card { background: #262626; padding: 40px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-card h2 { color: var(--accent); margin-bottom: 25px; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; font-size: 16px; }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); border: none; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1rem; text-transform: uppercase; }

        /* App Layout */
        header { background: var(--primary); color: var(--accent); padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; position: sticky; top: 0; z-index: 100; }
        .content { padding: 15px; padding-bottom: 100px; max-width: 600px; margin: auto; }
        
        /* Buscador Dual (Voz y Manual) */
        .search-section { background: var(--white); padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .manual-search { width: 100%; padding: 12px; border-radius: 25px; border: 2px solid #ddd; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; color: #333; background: #f9f9f9; }
        .voice-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        #mic-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: var(--danger); color: white; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(211,47,47,0.3); }
        #mic-btn.active { animation: pulse 1s infinite; background: #b71c1c; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Lista de Resultados */
        .card { background: var(--white); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .dest-name { font-weight: bold; text-transform: uppercase; font-size: 0.85rem; color: #2c3e50; flex: 1; }
        .price-val { color: var(--success); font-weight: 800; font-size: 1.2rem; margin-left: 10px; }
        
        /* Navegación */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; height: 70px; border-top: 1px solid #ddd; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 0.75rem; font-weight: bold; color: #666; }
        .nav-item span { font-size: 1.4rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>OTIMAC</h2>
            <input type="text" id="user" placeholder="Usuario" spellcheck="false">
            <input type="password" id="pin" placeholder="PIN">
            <button class="btn-main" onclick="validarAcceso()">INGRESAR</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header>TARIFARIO OTIMAC</header>
        <div class="content">
            <div id="view-search">
                <div class="search-section">
                    <input type="text" id="manual-input" class="manual-search" placeholder="Escribe el destino aquí..." oninput="buscarManual()">
                    
                    <div class="voice-row">
                        <button id="mic-btn" onclick="iniciarVoz()">🎤</button>
                        <div style="text-align: left;">
                            <span id="msg" style="font-weight: bold; font-size: 0.9rem;">Toca para hablar</span><br>
                            <span id="heard" style="color: var(--danger); font-size: 0.8rem; font-style: italic;"></span>
                        </div>
                    </div>
                </div>
                <div id="lista-resultados"></div>
            </div>

            <div id="view-admin" class="hidden">
                <div style="background:white; padding:20px; border-radius:15px; margin-bottom:20px;">
                    <h3>Nueva Ruta</h3>
                    <input type="text" id="adm-dest" placeholder="Nombre Destino" style="background:#f0f0f0; color:#333;">
                    <input type="text" id="adm-price" placeholder="Precio ($)" style="background:#f0f0f0; color:#333;">
                    <button class="btn-main" onclick="guardarNuevaRuta()">GUARDAR</button>
                </div>
                <div id="lista-admin-total"></div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" onclick="cambiarTab('search', this)"><span>🔍</span>BUSCAR</div>
            <div class="nav-item" id="btn-admin-nav" style="display:none" onclick="cambiarTab('admin', this)"><span>⚙️</span>ADMIN</div>
            <div class="nav-item" onclick="location.reload()"><span>❌</span>SALIR</div>
        </nav>
    </div>

<script>
    // BASE DE DATOS COMPLETA INTEGRADA
    const DATOS_MAESTROS = [
        ["ALCHIPAHUAC (CENTRO)", "$150.00"], ["ALCHIPAHUAC (CRUCERO)", "$100.00"], ["AGUA FRIA CRUCERO SRA. CHONA", "$140.00"], ["AGUA FRIA DELEGACION", "$150.00"], ["AVIACION (PANTEON)", "$40.00"], ["AVIACION (ESCUELA PRIMARIA)", "$50.00"], ["AVIACION (PARTE ALTA ELVIA)", "$100.00"], ["AVIACION (PARTE ALTA TANQUE)", "$130.00"], ["AVIACION (SEGUNDA CALLE ANTES DE LA ESCUELA)", "$70.00"], ["ASERRADERO", "$100.00"], ["ALTAMIRANO COLONIA UNIVERSIDAD", "$90.00"], ["BARRANCA XALE DELEGACION", "$250.00"], ["BARRANCA XALE (CRUCERO CRUZTO)", "$140.00"], ["BARRANCA XALE (LICHO)", "$150.00"], ["BASURERO (ASERRADERO)", "$130.00"], ["CERRO ARDILLA CRUCERO", "$50.00"], ["CERRO ARDILLA (PALADIO)", "$70.00"], ["CERRO ARDILLA (ESC. PRIMARIA)", "$100.00"], ["CERRO ARDILLA (DEBAJO DE LA ESCUELA)", "$100.00"], ["CRUCERO DE ILIATENCO", "$200.00"], ["CRUCERO DE CASCADA", "$70.00"], ["CERRO CUATE RUMBO A LA CASCADA", "$80.00"], ["CERRO CUATE CASCADA INTERMEDIO", "$80.00"], ["CERRO CUATE (COMISARIA)", "$80.00"], ["CERRO CUATE (PUENTE ARTURO RAMOS)", "$100.00"], ["CERRO CUATE (TERMINACION CAROLINA)", "$120.00"], ["CERRO GUAYABO", "$190.00"], ["CRUZ VERDE DELEGACION", "$100.00"], ["CRUZTOMAHUAC", "$200.00"], ["CERRO TEJON", "$380.00"], ["COLONIA SANCHEZ", "$300.00"], ["CAÑADA SUR (DELEGACION)", "$60.00"], ["CRUZ LA VILLA (DELEGACION)", "$120.00"], ["CRUZ LA VILLA (INTERMEDIO FELIPE)", "$70.00"], ["CRUZ LA VILLA (ENRIQUE)", "$100.00"], ["CRUCERO DE HONDURA TIGRE RUMBO (TLAHUI)", "$300.00"], ["FLOR DE CORAZON (DONDE BENITO)", "$200.00"], ["LOMA LARGA", "$90.00"], ["LOMA ENCINO (ESCUELA PRIMARIA)", "$70.00"], ["LOMA ENCINO (DELEGACION Y PARTE ALTA)", "$120.00"], ["LOMA VIGAS (DELEGACION)", "$280.00"], ["LOMA CUAPINOLE (CRUCERO)", "$80.00"], ["LOMA CUAPINOLE (DELEGACION, ESCUELA PRIM.)", "$150.00"], ["LOMA CUAPINOLE (ABEL)", "$150.00"], ["LOMA CUAPINOLE (DELEGACION PARTE BAJA)", "$200.00"], ["LLANO PAJARITO (RUMBO A TEJON)", "$700.00"], ["OJO DE AGUA (CRUCERO)", "$50.00"], ["OJO DE AGUA (PRIMARIA Y DELEGACION)", "$60.00"], ["ORIENTAL (DELEGACION)", "$50.00"], ["ORIENTAL (CAPILLA PARTE ALTA)", "$100.00"], ["PLAN GALEANA", "$50.00"], ["PLAN GALEANA (ENFRENTE TERMINACION)", "$100.00"], ["PLAN GALEANA (CRUCERO CRUZTO PUENTE)", "$60.00"], ["PARAISO", "$80.00"], ["PLAN PORTILLO (AL FINAL DEL CAMINO)", "$350.00"], ["PLAN PORTILLO (CAPILLA)", "$320.00"], ["PIEDRA BLANCA", "$200.00"], ["PASO BALLENA", "$250.00"], ["PLAN CANTU", "$50.00"], ["PLAN CANTU (DELEGACION)", "$60.00"], ["PORTEZUELO DEL CLARIN (CRUCERO CIRINO)", "$140.00"], ["PORTEZUELO DEL CLARIN (ESCUELA)", "$180.00"], ["PORTEZUELO DEL CLARIN (PARTE ALTA SILVESTRE)", "$220.00"], ["PORTEZUELO DEL CLARIN (CAPILLA)", "$180.00"], ["PORTEZUELO DEL CLARIN (CASA DE ADOBE)", "$230.00"], ["PORTEZUELO INTERMEDIO SAN MARTIN", "$100.00"], ["PLAN LIMON (TIMOTEO)", "$180.00"], ["PLAN LIMON (TERMINACION)", "$220.00"], ["RENACIMIENTO (ASERRADERO)", "$120.00"], ["SANTA CRUZ HERNANDEZ (MAXIMINO)", "$40.00"], ["SANTA CRUZ HERNANDEZ (MADRE CALIXTO)", "$50.00"], ["SAN MATEO ANTENA", "$150.00"], ["SAN MATEO PARTE ALTA", "$180.00"], ["SAN ANTONIO", "$100.00"], ["SAN ANTONIO (PLAN LUIS ESPINOBARROS)", "$150.00"], ["SAN ISIDRO ESC. PRIM.", "$60.00"], ["SAN ISIDRO (EL MANGO)", "$100.00"], ["SAN ISIDRO DELEGACION", "$120.00"], ["SAN MARTIN DELEGACION", "$60.00"], ["SAN MARTIN (TANQUE)", "$60.00"], ["SAN MARTIN (TERMINACION EUGENIA)", "$70.00"], ["SAN JUAN DEL RIO (DELEGACION)", "$180.00"], ["SAN JUAN DEL RIO (NICASIO RUIZ)", "$200.00"], ["SANTA CECILIA DELEGACION", "$50.00"], ["SANTA CECILIA PARTE ALTA", "$60.00"], ["SAN JOSE VISTA HERMOSA", "$170.00"], ["SAN MIGUEL REEDII", "$200.00"], ["SAN JOSE VISTA HERMOSA (ANTENA)", "$250.00"], ["TLAHUITEPEC", "$600.00"], ["TIERRA COLORADA ANEXO CRUZTO", "$230.00"], ["UNIVERSIDAD (DELEGACION)", "$70.00"], ["UNIVERSIDAD (ESC. PRIMARIA)", "$50.00"], ["UNIVERSIDAD (MIGUEL FLORES)", "$120.00"], ["UNIVERSIDAD (PREPARATORIA)", "$50.00"], ["VISTA HERMOSA", "$80.00"], ["VISTA HERMOSA (SRA. TAMALES)", "$80.00"], ["VISTA HERMOSA (SUEGRO DE CHAVA)", "$100.00"], ["VISTA HERMOSA TERMINACION", "$120.00"], ["VISTA ALEGRE (DERRUMBE)", "$80.00"], ["VISTA ALEGRE (DELEGACION)", "$90.00"], ["13 DE SEPTIEMBRE (DELEGACION)", "$100.00"], ["10 DE MAYO", "$280.00"], ["24 DE ENERO", "$100.00"], ["TILAPA", "$400.00"], ["PARAJE MONTERO", "$500.00"], ["3 MARIAS", "$350.00"], ["COLOMBIA DE GUADALUPE", "$300.00"], ["ESPINO BLANCO", "$300.00"], ["TIERRA COLORADA", "$500.00"], ["ATOTONILCO DE HORCASITAS", "$800.00"], ["SAN LUIS RENACIMIENTO", "$800.00"], ["PARAJE OCOTERO", "$700.00"], ["PASCALA DEL ORO", "$900.00"], ["CERRO TIMBRE", "$600.00"], ["TOTOMIXTLAHUACA", "$1,000.00"], ["SAN MIGUEL EL PROGRESO", "$500.00"], ["LA CIENEGA (MALINA)", "$80.00"], ["MALINALTEPEC", "$1,000.00"], ["XALPA", "$1,800.00"], ["XOCHIATENCO", "$800.00"], ["TUXTEPEC", "$400.00"], ["POTRERILLO CUAPINOLE", "$300.00"], ["POTRERILLO DEL RINCON", "$400.00"], ["SANTA CRUZ DEL RINCON", "$500.00"], ["ARROYO SAN PEDRO", "$500.00"], ["BUENA VISTA", "$900.00"], ["PUEBLO HIDALGO", "$600.00"], ["MESON IXTLAHUAC", "$600.00"], ["TLAXCALIXTLAHUACA", "$1,000.00"], ["RIO IGUAPA", "$1,200.00"], ["TLAPA", "$2,000.00"], ["SAN LUIS ACATLAN", "$900.00"], ["OMETEPEC", "$2,000.00"], ["MARQUELIA", "$1,300.00"], ["IGUALAPA", "$2,000.00"], ["CHILPANCINGO", "$5,500.00"], ["ACAPULCO", "$4,500.00"], ["MEXICO", "$10,000.00"], ["JUQUILA-OAXACA", "$7,000.00"], ["PUEBLA", "$7,500.00"], ["AYUTLA DE LOS LIBRES", "$3,500.00"], ["RANCHO VIEJO", "$900.00"], ["TLACOAPA", "$2,000.00"]
    ];

    let baseDatos = JSON.parse(localStorage.getItem('otimac_v2')) || DATOS_MAESTROS;
    const credenciales = [{u: "warclib", p: "0000", r: "admin"}, {u: "chofer", p: "1234", r: "user"}];

    function validarAcceso() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pin').value.trim();
        const auth = credenciales.find(c => c.u === u && c.p === p);
        if(auth) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            if(auth.r === 'admin') document.getElementById('btn-admin-nav').style.display = 'flex';
        } else alert("Datos incorrectos");
    }

    function buscarManual() {
        const input = document.getElementById('manual-input').value.toLowerCase();
        ejecutarFiltro(input);
    }

    function iniciarVoz() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-MX';
        recognition.onstart = () => { 
            document.getElementById('mic-btn').classList.add('active'); 
            document.getElementById('msg').innerText = "Escuchando...";
        };
        recognition.onresult = (e) => {
            const voz = e.results[0][0].transcript.toLowerCase();
            document.getElementById('heard').innerText = `Dijiste: "${voz}"`;
            document.getElementById('manual-input').value = voz;
            ejecutarFiltro(voz);
        };
        recognition.onend = () => { 
            document.getElementById('mic-btn').classList.remove('active'); 
            document.getElementById('msg').innerText = "Toca para hablar";
        };
        recognition.start();
    }

    function ejecutarFiltro(termino) {
        const resDiv = document.getElementById('lista-resultados');
        resDiv.innerHTML = "";
        if(termino.length < 2) return;
        const filtrados = baseDatos.filter(r => r[0].toLowerCase().includes(termino));
        filtrados.forEach(res => {
            resDiv.innerHTML += `<div class="card"><span class="dest-name">${res[0]}</span><span class="price-val">${res[1]}</span></div>`;
        });
    }

    function cambiarTab(tab, el) {
        document.getElementById('view-search').classList.toggle('hidden', tab !== 'search');
        document.getElementById('view-admin').classList.toggle('hidden', tab !== 'admin');
        if(tab === 'admin') actualizarListaAdmin();
    }

    function actualizarListaAdmin() {
        const container = document.getElementById('lista-admin-total');
        container.innerHTML = "<h4>Rutas (${baseDatos.length})</h4>";
        baseDatos.forEach((r, i) => {
            container.innerHTML += `<div class="card" style="border-left-color:#666"><span>${r[0]} - ${r[1]}</span><button onclick="borrarRuta(${i})" style="border:none; background:red; color:white; border-radius:5px; padding:5px 10px;">🗑️</button></div>`;
        });
    }

    function guardarNuevaRuta() {
        const d = document.getElementById('adm-dest').value.toUpperCase().trim();
        const p = document.getElementById('adm-price').value.trim();
        if(d && p) {
            baseDatos.unshift([d, p]);
            localStorage.setItem('otimac_v2', JSON.stringify(baseDatos));
            alert("Guardado");
            actualizarListaAdmin();
        }
    }

    function borrarRuta(i) {
        if(confirm("¿Borrar?")) { baseDatos.splice(i, 1); localStorage.setItem('otimac_v2', JSON.stringify(baseDatos)); actualizarListaAdmin(); }
    }
</script>
</body>
</html>
