<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OTIMAC - Control Total</title>
    <style>
        :root { --primary: #1a1a1a; --accent: #fbc02d; --bg: #f0f2f5; --white: #ffffff; --danger: #d32f2f; --success: #2e7d32; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: #333; }
        .hidden { display: none !important; }
        header { background: var(--primary); color: var(--accent); padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .content { padding: 15px; padding-bottom: 100px; max-width: 600px; margin: auto; }
        
        /* Forms & Cards */
        .card-box { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-danger { background: var(--danger); color: white; padding: 5px 10px; width: auto; }

        /* Search List */
        .res-card { background: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--accent); }
        .price-text { color: var(--success); font-weight: bold; font-size: 1.1rem; }

        /* Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; border-top: 1px solid #ddd; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 0.7rem; color: #666; }
        .nav-item span { font-size: 1.3rem; }

        /* Login */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--primary); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="background:#262626; padding:30px; border-radius:20px; width:80%; max-width:350px; text-align:center;">
            <h2 style="color:var(--accent)">OTIMAC</h2>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pin" placeholder="PIN">
            <button class="btn btn-accent" onclick="validar()">Ingresar</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header id="app-header">OTIMAC</header>
        <div class="content">
            
            <div id="view-search">
                <div class="card-box" style="text-align:center;">
                    <input type="text" id="manual-input" placeholder="Buscar destino..." oninput="ejecutarFiltro(this.value)">
                    <button id="mic-btn" onclick="iniciarVoz()" style="background:var(--danger); color:white; border:none; width:60px; height:60px; border-radius:50%; font-size:24px; margin-top:10px;">🎤</button>
                    <p id="heard" style="font-size:0.8rem; color:red; margin-top:5px; font-style:italic;"></p>
                </div>
                <div id="lista-resultados"></div>
            </div>

            <div id="view-admin" class="hidden">
                <div class="card-box">
                    <h3>Gestión de Usuarios</h3>
                    <input type="text" id="new-u-name" placeholder="Nombre del Chofer">
                    <input type="password" id="new-u-pin" placeholder="PIN (4 dígitos)">
                    <button class="btn btn-accent" onclick="crearUsuario()">Dar de Alta Chofer</button>
                    <div id="users-list-ui" style="margin-top:15px; font-size:0.9rem;"></div>
                </div>

                <div class="card-box">
                    <h3>Nueva Ruta</h3>
                    <input type="text" id="new-r-dest" placeholder="Destino">
                    <input type="text" id="new-r-price" placeholder="Precio ($)">
                    <button class="btn btn-accent" onclick="crearRuta()">Guardar Ruta</button>
                </div>
            </div>

        </div>

        <nav class="nav-bar">
            <div class="nav-item" onclick="showTab('search')"><span>🔍</span>BUSCAR</div>
            <div id="admin-nav" class="nav-item hidden" onclick="showTab('admin')"><span>👥</span>ADMIN</div>
            <div class="nav-item" onclick="location.reload()"><span>❌</span>SALIR</div>
        </nav>
    </div>

<script>
    // DATOS MAESTROS (Rutas)
    const RUTAS_BASE = [
        ["ALCHIPAHUAC (CENTRO)", "$150.00"], ["ALCHIPAHUAC (CRUCERO)", "$100.00"], ["ASERRADERO", "$100.00"], ["TLAPA", "$2,000.00"], ["CHILPANCINGO", "$5,500.00"], ["ACAPULCO", "$4,500.00"], ["MEXICO", "$10,000.00"]
        /* Aquí puedes pegar el resto de las 100+ rutas que ya te pasé */
    ];

    // USUARIOS INICIALES (Si el admin borra todo, este queda por defecto)
    const USUARIOS_BASE = [
        {u: "warclib", p: "0000", r: "admin"}
    ];

    let dbRutas = JSON.parse(localStorage.getItem('otimac_rutas')) || RUTAS_BASE;
    let dbUsers = JSON.parse(localStorage.getItem('otimac_users')) || USUARIOS_BASE;

    function validar() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pin').value.trim();
        const found = dbUsers.find(x => x.u === u && x.p === p);

        if(found) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            if(found.r === 'admin') document.getElementById('admin-nav').classList.remove('hidden');
        } else { alert("Acceso Denegado"); }
    }

    // GESTIÓN USUARIOS
    function crearUsuario() {
        const name = document.getElementById('new-u-name').value.toLowerCase().trim();
        const pin = document.getElementById('new-u-pin').value.trim();
        if(name && pin) {
            dbUsers.push({u: name, p: pin, r: "user"});
            localStorage.setItem('otimac_users', JSON.stringify(dbUsers));
            alert("Chofer Registrado");
            actualizarUIAdmin();
        }
    }

    function borrarUsuario(index) {
        if(dbUsers[index].r === 'admin') return alert("No puedes borrar al administrador");
        if(confirm("¿Eliminar acceso a este chofer?")) {
            dbUsers.splice(index, 1);
            localStorage.setItem('otimac_users', JSON.stringify(dbUsers));
            actualizarUIAdmin();
        }
    }

    function actualizarUIAdmin() {
        const list = document.getElementById('users-list-ui');
        list.innerHTML = "<strong>Choferes activos:</strong><br>";
        dbUsers.forEach((user, i) => {
            if(user.r !== 'admin') {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; margin:5px 0;">
                    ${user.u} (PIN: ${user.p}) 
                    <button class="btn-danger" onclick="borrarUsuario(${i})">X</button>
                </div>`;
            }
        });
    }

    // BUSQUEDA
    function ejecutarFiltro(val) {
        const container = document.getElementById('lista-resultados');
        container.innerHTML = "";
        if(val.length < 2) return;
        const res = dbRutas.filter(r => r[0].toLowerCase().includes(val.toLowerCase()));
        res.forEach(item => {
            container.innerHTML += `<div class="res-card"><span>${item[0]}</span><span class="price-text">${item[1]}</span></div>`;
        });
    }

    function iniciarVoz() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-MX';
        rec.onstart = () => { document.getElementById('heard').innerText = "Escuchando..."; };
        rec.onresult = (e) => {
            const voz = e.results[0][0].transcript.toLowerCase();
            document.getElementById('manual-input').value = voz;
            document.getElementById('heard').innerText = `Dijiste: "${voz}"`;
            ejecutarFiltro(voz);
        };
        rec.start();
    }

    // NAVEGACION
    function showTab(tab) {
        document.getElementById('view-search').classList.toggle('hidden', tab !== 'search');
        document.getElementById('view-admin').classList.toggle('hidden', tab !== 'admin');
        if(tab === 'admin') actualizarUIAdmin();
    }

    function crearRuta() {
        const d = document.getElementById('new-r-dest').value.toUpperCase();
        const p = document.getElementById('new-r-price').value;
        if(d && p) {
            dbRutas.unshift([d, p]);
            localStorage.setItem('otimac_rutas', JSON.stringify(dbRutas));
            alert("Ruta Guardada");
        }
    }
</script>
</body>
</html>
