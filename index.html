<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC TSIAKHE</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; }
        header { background: #1a1a1a; color: #fbc02d; padding: 15px; text-align: center; font-weight: bold; }
        .card { background: white; padding: 20px; border-radius: 15px; margin: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .res-item { background: white; padding: 12px; margin: 8px 15px; border-radius: 10px; border-left: 5px solid #fbc02d; display: flex; justify-content: space-between; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <header>ACCESO OTIMAC</header>
        <div class="card">
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pin" placeholder="PIN">
            <button onclick="login()" style="width:100%; padding:12px; background:#fbc02d; border:none; border-radius:8px; font-weight:bold;">INGRESAR</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header>OTIMAC - BUSCADOR</header>
        <div class="card">
            <input type="text" id="busqueda" placeholder="Escribe el destino..." oninput="filtrar(this.value)">
        </div>
        <div id="resultados"></div>
    </div>

<script>
    // TUS DATOS DE CONFIGURACIÓN
    const firebaseConfig = {
        apiKey: "AIzaSyDKdDduhDRFsdNOiAejQBxxKN-HLv_Jd0A",
        authDomain: "otimac-277ef.firebaseapp.com",
        databaseURL: "https://otimac-277ef-default-rtdb.firebaseio.com",
        projectId: "otimac-277ef",
        storageBucket: "otimac-277ef.firebasestorage.app",
        appId: "1:20000838532:web:5f5c2d76abd78d7f2a03d1"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Memoria Local (Offline)
    let DATOS_LOCALES = JSON.parse(localStorage.getItem('otimac_backup') || '{"rutas":{}, "usuarios":{}}');

    // Sincronizar con la nube cuando haya internet
    db.ref('/').on('value', (snap) => {
        const data = snap.val();
        if (data) {
            DATOS_LOCALES = data;
            localStorage.setItem('otimac_backup', JSON.stringify(data));
        }
    });

    function login() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pin').value.trim();
        
        const usuarios = Object.values(DATOS_LOCALES.usuarios || {});
        const auth = (u === "warclib" && p === "0000") || usuarios.find(x => x.u === u && x.p === p);

        if (auth) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            filtrar('');
        } else {
            alert("Acceso denegado.");
        }
    }

    function filtrar(t) {
        const term = t.toLowerCase();
        const res = document.getElementById('resultados');
        res.innerHTML = "";
        const rutas = Object.values(DATOS_LOCALES.rutas || {});
        rutas.filter(r => r.d.toLowerCase().includes(term)).forEach(r => {
            res.innerHTML += `<div class="res-item"><span>${r.d}</span><span style="color:green">${r.p}</span></div>`;
        });
    }
</script>
</body>
</html>
