<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4a148c">
    <title>OTIMAC - ssc tsiakhe</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #4a148c; --accent: #7b1fa2; --bg: #f3e5f5; --white: #ffffff; --red: #d32f2f; --green: #388e3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.3rem; }
        #status-bar { font-size: 10px; text-align: center; padding: 5px; background: #e1bee7; color: var(--primary); font-weight: bold; }
        .hidden { display: none !important; }
        .card { background: var(--white); padding: 20px; border-radius: 20px; margin: 15px; box-shadow: 0 4px 12px rgba(74, 20, 140, 0.1); }
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 2px solid #e1bee7; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        #mic-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: var(--red); color: white; font-size: 35px; cursor: pointer; display: block; margin: 15px auto; transition: 0.3s; }
        .escuchando { background: var(--green) !important; animation: pulse-morado 1.5s infinite; }
        @keyframes pulse-morado { 0% { box-shadow: 0 0 0 0 rgba(74, 20, 140, 0.7); } 70% { box-shadow: 0 0 0 25px rgba(74, 20, 140, 0); } 100% { box-shadow: 0 0 0 0 rgba(74, 20, 140, 0); } }
        .res-item { background: white; padding: 18px; margin: 10px 15px; border-radius: 15px; border-left: 8px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .price { color: var(--green); font-size: 1.4em; font-weight: bold; }
        .btn-edit { background: #ffa000; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .admin-list-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
        .btn-install { background: var(--primary); color: white; margin: 15px; width: calc(100% - 30px); border: 2px solid #e1bee7; }
    </style>
</head>
<body>

    <header>OTIMAC - ssc tsiakhe</header>
    <div id="status-bar">SISTEMA OTIMAC ACTIVO</div>

    <button id="install-btn" class="btn btn-install hidden">📲 INSTALAR APP</button>

    <div id="login-screen">
        <div class="card" style="text-align: center;">
            <h2 style="color: var(--primary);">ACCESO</h2>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pin" placeholder="PIN">
            <button class="btn" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <div class="card">
            <input type="text" id="busqueda" placeholder="Buscar destino..." oninput="filtrar(this.value)">
            <button id="mic-btn" onclick="toggleVoz()">🎤</button>
            <p id="v-status" style="text-align:center; font-size:12px; color:#666;">Toca para hablar</p>
        </div>
        <div id="resultados"></div>
        <div style="padding: 15px;">
            <button id="admin-btn" class="btn hidden" style="background:#0288d1; margin-bottom:10px;" onclick="toggleAdmin(true)">⚙️ PANEL ADMIN</button>
            <button class="btn" style="background:#666;" onclick="logout()">CERRAR SESIÓN</button>
        </div>
    </div>

    <div id="admin-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; padding:20px; overflow-y:auto; box-sizing:border-box;">
        <button class="btn" onclick="toggleAdmin(false)" style="background:#666;">VOLVER</button>
        <h3 id="admin-title">Agregar/Editar Tarifa</h3>
        <input type="text" id="new-dest" placeholder="Destino">
        <input type="text" id="new-price" placeholder="Precio">
        <button class="btn" onclick="guardarRuta()">GUARDAR RUTA</button>
        <hr>
        <h3>Choferes Registrados</h3>
        <div id="lista-choferes"></div>
        <hr>
        <input type="text" id="new-chofer" placeholder="Nuevo Chofer">
        <input type="password" id="new-chofer-pin" placeholder="PIN">
        <button class="btn" onclick="guardarChofer()" style="background:#444;">AGREGAR CHOFER</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDKdDduhDRFsdNOiAejQBxxKN-HLv_Jd0A",
        authDomain: "otimac-277ef.firebaseapp.com",
        databaseURL: "https://otimac-277ef-default-rtdb.firebaseio.com",
        projectId: "otimac-277ef",
        storageBucket: "otimac-277ef.firebasestorage.app",
        messagingSenderId: "20000838532",
        appId: "1:20000838532:web:5f5c2d76abd78d7f2a03d1"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let DATOS = {rutas:{}, usuarios:{}};
    let isAdmin = false;
    let sesionIniciada = false;
    let recognition;
    let isListening = false;

    db.ref('/').on('value', (snap) => {
        DATOS = snap.val() || {rutas:{}, usuarios:{}};
        if(!sesionIniciada && localStorage.getItem('sesion_otimac_v1')) login(true);
        if(isAdmin) listarChoferes();
    });

    function login(auto = false) {
        const u = auto ? localStorage.getItem('sesion_otimac_v1') : document.getElementById('user').value.toLowerCase().trim();
        const p = auto ? localStorage.getItem('pin_otimac_v1') : document.getElementById('pin').value.trim();
        isAdmin = (u === "warclib" && p === "0000");
        const usuarios = Object.values(DATOS.usuarios || {});
        const esChofer = usuarios.find(x => x.u === u && x.p === p);
        if (isAdmin || esChofer) {
            sesionIniciada = true;
            localStorage.setItem('sesion_otimac_v1', u);
            localStorage.setItem('pin_otimac_v1', p);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            if(isAdmin) document.getElementById('admin-btn').classList.remove('hidden');
        } else if(!auto) alert("Acceso denegado");
    }

    function filtrar(term) {
        const res = document.getElementById('resultados');
        res.innerHTML = "";
        if(!term || term.length < 2) return;
        const t = term.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        Object.keys(DATOS.rutas || {}).forEach(key => {
            const r = DATOS.rutas[key];
            const dNorm = r.d.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            if(dNorm.includes(t)) {
                res.innerHTML += `
                    <div class="res-item">
                        <div>
                            <div style="font-weight:bold">${r.d}</div>
                            ${isAdmin ? `<button class="btn-edit" onclick="prepararEdicion('${key}', '${r.d}', '${r.p}')">EDITAR</button>
                            <button onclick="borrarRuta('${key}')" style="color:red; border:none; background:none; font-size:10px; cursor:pointer;">ELIMINAR</button>` : ''}
                        </div>
                        <div class="price">${r.p}</div>
                    </div>`;
            }
        });
    }

    function toggleVoz() {
        if (!recognition) {
            const speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!speech) return alert("Navegador no soportado");
            recognition = new speech();
            recognition.lang = 'es-MX';
            recognition.continuous = false;
            recognition.onstart = () => {
                isListening = true;
                document.getElementById('mic-btn').classList.add('escuchando');
                document.getElementById('v-status').innerText = "Escuchando... Toca para parar";
            };
            recognition.onend = () => {
                isListening = false;
                document.getElementById('mic-btn').classList.remove('escuchando');
                document.getElementById('v-status').innerText = "Toca para hablar";
            };
            recognition.onresult = (e) => {
                let texto = e.results[0][0].transcript;
                document.getElementById('busqueda').value = texto;
                filtrar(texto);
            };
        }

        if (isListening) {
            recognition.stop();
        } else {
            recognition.start();
        }
    }

    function listarChoferes() {
        const lista = document.getElementById('lista-choferes');
        if(!lista) return;
        lista.innerHTML = "";
        Object.keys(DATOS.usuarios || {}).forEach(key => {
            const u = DATOS.usuarios[key];
            lista.innerHTML += `<div class="admin-list-item"><span>${u.u.toUpperCase()}</span><button onclick="borrarChofer('${key}')" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">ELIMINAR</button></div>`;
        });
    }

    function toggleAdmin(s) { document.getElementById('admin-modal').classList.toggle('hidden', !s); if(s) listarChoferes(); }
    function prepararEdicion(id, dest, precio) {
        toggleAdmin(true);
        document.getElementById('new-dest').value = dest;
        document.getElementById('new-price').value = precio;
        document.getElementById('admin-title').innerText = "Editando Tarifa";
    }
    function guardarRuta() {
        const d = document.getElementById('new-dest').value.toUpperCase().trim();
        const p = document.getElementById('new-price').value.trim();
        if(d && p) {
            const id = d.replace(/[^A-Z0-9]/g, "_");
            db.ref('rutas/'+id).set({d, p}).then(() => {
                alert("Guardado");
                document.getElementById('new-dest').value = "";
                document.getElementById('new-price').value = "";
                document.getElementById('admin-title').innerText = "Agregar/Editar Tarifa";
            });
        }
    }
    function guardarChofer() {
        const u = document.getElementById('new-chofer').value.toLowerCase().trim();
        const p = document.getElementById('new-chofer-pin').value.trim();
        if(u && p) db.ref('usuarios/'+u).set({u, p}).then(() => {
            alert("Chofer agregado");
            document.getElementById('new-chofer').value = "";
            document.getElementById('new-chofer-pin').value = "";
        });
    }
    function borrarRuta(id) { if(confirm("¿Borrar?")) db.ref('rutas/'+id).remove(); }
    function borrarChofer(id) { if(confirm("¿Quitar acceso?")) db.ref('usuarios/'+id).remove(); }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
