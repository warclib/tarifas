<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OTIMAC - Tarifario Oficial</title>
    <style>
        :root { --primary: #1a1a1a; --accent: #fbc02d; --bg: #f0f2f5; --white: #ffffff; --danger: #d32f2f; --success: #2e7d32; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: #333; }
        .hidden { display: none !important; }
        header { background: var(--primary); color: var(--accent); padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .content { padding: 15px; padding-bottom: 100px; max-width: 600px; margin: auto; }
        .card-box { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; background: #f9f9f9; color: #333; }
        #mic-btn { width: 70px; height: 70px; border-radius: 50%; border: none; background: var(--danger); color: white; font-size: 28px; cursor: pointer; box-shadow: 0 5px 15px rgba(211,47,47,0.3); }
        #mic-btn.active { animation: pulse 1s infinite; background: #b71c1c; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .res-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .dest-name { font-weight: bold; text-transform: uppercase; font-size: 0.8rem; color: #2c3e50; flex: 1; text-align: left; padding-right: 5px; }
        .price-text { color: var(--success); font-weight: 800; font-size: 1.1rem; white-space: nowrap; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #ddd; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 0.75rem; color: #666; font-weight: bold; }
        .nav-item span { font-size: 1.5rem; margin-bottom: 3px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-accent { background: var(--accent); color: #000; }
        .note { font-size: 0.75rem; color: #777; font-style: italic; margin-top: 10px; }
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--primary); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="background:#262626; padding:35px; border-radius:25px; width:85%; max-width:350px; text-align:center;">
            <h2 style="color:var(--accent)">OTIMAC</h2>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pin" placeholder="PIN">
            <button class="btn btn-accent" onclick="validar()">Ingresar</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header>TARIFARIO OTIMAC</header>
        <div class="content">
            <div id="view-search">
                <div class="card-box">
                    <input type="text" id="manual-input" placeholder="Escribe o usa el micro..." oninput="ejecutarFiltro(this.value)">
                    <button id="mic-btn" onclick="iniciarVoz()">🎤</button>
                    <p id="heard" style="font-size:0.85rem; color:var(--danger); margin-top:10px; font-weight:bold; min-height:1em;"></p>
                    <div class="note">Taxi Local Centro: $40.00 | 6AM - 8PM</div>
                </div>
                <div id="lista-resultados"></div>
            </div>

            <div id="view-admin" class="hidden">
                <div class="card-box" style="text-align:left;">
                    <h3>Gestión Choferes</h3>
                    <input type="text" id="new-u-name" placeholder="Nombre Chofer">
                    <input type="password" id="new-u-pin" placeholder="PIN Acceso">
                    <button class="btn btn-accent" onclick="crearUsuario()">Alta de Chofer</button>
                    <div id="users-list-ui" style="margin-top:10px; border-top:1px solid #eee; padding-top:10px;"></div>
                </div>
                <div class="card-box" style="text-align:left;">
                    <h3>Agregar Ruta</h3>
                    <input type="text" id="new-r-dest" placeholder="Nombre Destino">
                    <input type="text" id="new-r-price" placeholder="Precio ($)">
                    <button class="btn btn-accent" onclick="crearRuta()">Guardar Nueva Ruta</button>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" onclick="showTab('search')"><span>🔍</span>BUSCAR</div>
            <div id="admin-nav" class="nav-item hidden" onclick="showTab('admin')"><span>⚙️</span>ADMIN</div>
            <div class="nav-item" onclick="location.reload()"><span>❌</span>SALIR</div>
        </nav>
    </div>

<script>
    const DATA = [

EPTIEMBRE (DELEGACION)","$100.00"],["10 DE MAYO","$280.00"],["24 DE ENERO","$100.00"],["TILAPA","$400.00"],["PARAJE MONTERO","$500.00"],["3 MARIAS","$350.00"],["COLOMBIA DE GUADALUPE","$300.00"],["ESPINO BLANCO","$300.00"],["TIERRA COLORADA","$500.00"],["ATOTONILCO DE HORCASITAS","$800.00"],["SAN LUIS RENACIMIENTO","$800.00"],["PARAJE OCOTERO","$700.00"],["PASCALA DEL ORO","$900.00"],["CERRO TIMBRE","$600.00"],["TOTOMIXTLAHUACA","$1,000.00"],["SAN MIGUEL EL PROGRESO","$500.00"],["LA CIENEGA (MALINA)","$800.00"],["MALINALTEPEC","$1,000.00"],["XALPA","$1,800.00"],["XOCHIATENCO","$800.00"],["TUXTEPEC","$400.00"],["POTRERILLO CUAPINOLE","$300.00"],["POTRERILLO DEL RINCON","$400.00"],["SANTA CRUZ DEL RINCON","$500.00"],["ARROYO SAN PEDRO","$500.00"],["BUENA VISTA","$900.00"],["PUEBLO HIDALGO","$600.00"],["MESON IXTLAHUAC","$600.00"],["TLAXCALIXTLAHUACA","$1,000.00"],["RIO IGUAPA","$1,200.00"],["TLAPA","$2,000.00"],["SAN LUIS ACATLAN","$900.00"],["OMETEPEC","$2,000.00"],["MARQUELIA","$1,300.00"],["IGUALAPA","$2,000.00"],["CHILPANCINGO","$5,500.00"],["ACAPULCO","$4,500.00"],["MEXICO","$10,000.00"],["JUQUILA-OAXACA","$7,000.00"],["PUEBLA","$7,500.00"],["AYUTLA DE LOS LIBRES","$3,500.00"],["RANCHO VIEJO","$900.00"],["TLACOAPA","$2,000.00"]
    ];

    let dbRutas = JSON.parse(localStorage.getItem('ot_v4_r')) || DATA;
    let dbUsers = JSON.parse(localStorage.getItem('ot_v4_u')) || [{u: "warclib", p: "0000", r: "admin"}];

    // Mapeo para mejorar la detección de voz (Similitud)
    const VOZ_FIX = {"crusto": "cruzto", "tlahui": "tlahuitepec", "mahuac": "cruztomahuac", "iliatenco": "iliatenco"};

    function validar() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pin').value.trim();
        const auth = dbUsers.find(x => x.u === u && x.p === p);
        if(auth) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            if(auth.r === 'admin') document.getElementById('admin-nav').classList.remove('hidden');
        } else alert("Acceso Incorrecto");
    }

    function ejecutarFiltro(val) {
        const container = document.getElementById('lista-resultados');
        container.innerHTML = "";
        let t = val.toLowerCase().trim();
        for (let error in VOZ_FIX) { if (t.includes(error)) t = t.replace(error, VOZ_FIX[error]); }
        if(t.length < 2) return;
        dbRutas.filter(r => r[0].toLowerCase().includes(t) || t.includes(r[0].toLowerCase())).forEach(item => {
            container.innerHTML += `<div class="res-card"><span class="dest-name">${item[0]}</span><span class="price-text">${item[1]}</span></div>`;
        });
    }

    function iniciarVoz() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-MX';
        rec.onstart = () => { document.getElementById('mic-btn').classList.add('active'); document.getElementById('heard').innerText = "Escuchando..."; };
        rec.onresult = (e) => {
            let v = e.results[0][0].transcript.toLowerCase();
            document.getElementById('manual-input').value = v;
            document.getElementById('heard').innerText = `Entendí: "${v}"`;
            ejecutarFiltro(v);
        };
        rec.onend = () => document.getElementById('mic-btn').classList.remove('active');
        rec.start();
    }

    function showTab(tab) {
        document.getElementById('view-search').classList.toggle('hidden', tab !== 'search');
        document.getElementById('view-admin').classList.toggle('hidden', tab !== 'admin');
        if(tab === 'admin') {
            const ui = document.getElementById('users-list-ui');
            ui.innerHTML = "<strong>Choferes Registrados:</strong><br>";
            dbUsers.forEach((u, i) => { if(u.r !== 'admin') ui.innerHTML += `<div style="display:flex; justify-content:space-between; margin:5px 0;"><span>${u.u} (${u.p})</span><button onclick="borrarU(${i})" style="color:red;border:none;background:none;font-weight:bold;">ELIMINAR</button></div>`; });
        }
    }

    function crearUsuario() {
        const n = document.getElementById('new-u-name').value.toLowerCase().trim();
        const p = document.getElementById('new-u-pin').value.trim();
        if(n && p) { dbUsers.push({u:n, p:p, r:"user"}); localStorage.setItem('ot_v4_u', JSON.stringify(dbUsers)); showTab('admin'); alert("Chofer Agregado"); }
    }

    function borrarU(i) { if(confirm("¿Quitar acceso?")) { dbUsers.splice(i, 1); localStorage.setItem('ot_v4_u', JSON.stringify(dbUsers)); showTab('admin'); } }

    function crearRuta() {
        const d = document.getElementById('new-r-dest').value.toUpperCase().trim();
        const p = document.getElementById('new-r-price').value.trim();
        if(d && p) { dbRutas.unshift([d, p]); localStorage.setItem('ot_v4_r', JSON.stringify(dbRutas)); alert("Guardado"); }
    }
</script>
</body>
</html>
