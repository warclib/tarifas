<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ssc tsiakhe - OTIMAC</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #4a148c; /* Morado suave profundo */
            --accent: #9c27b0;  /* Morado más claro */
            --white: #ffffff; 
            --bg: #f3e5f5;      /* Fondo lavanda muy suave */
            --red: #d32f2f; 
            --green: #4CAF50; 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        
        .hidden { display: none !important; }
        .card { background: var(--white); padding: 20px; border-radius: 15px; margin: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        
        #status-bar { font-size: 11px; text-align: center; padding: 4px; background: #eee; font-weight: bold; }
        .online { color: var(--green); }
        .offline { color: #f57c00; }

        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-logout { background: #666; font-size: 12px; padding: 8px; margin-top: 10px; }
        
        #mic-btn { width: 75px; height: 75px; border-radius: 50%; border: none; background: var(--red); color: white; font-size: 30px; cursor: pointer; display: block; margin: 10px auto; transition: 0.3s; }
        .escuchando { animation: pulse-purple 1.5s infinite; background: var(--green) !important; }
        @keyframes pulse-purple { 0% { box-shadow: 0 0 0 0 rgba(156, 39, 176, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(156, 39, 176, 0); } 100% { box-shadow: 0 0 0 0 rgba(156, 39, 176, 0); } }

        .res-item { background: white; padding: 15px; margin: 8px 12px; border-radius: 10px; border-left: 6px solid var(--accent); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .price { color: var(--primary); font-size: 1.2em; font-weight: bold; }
        .btn-opt { padding: 6px 10px; font-size: 10px; border-radius: 5px; border: none; color: white; cursor: pointer; margin-right: 4px; }
    </style>
</head>
<body>

    <header>SITIO DE TAXIS OTIMAC</header>
    <div id="status-bar">Cargando sistema...</div>

    <div id="login-screen">
        <div class="card" style="text-align: center;">
            <h2 style="color: var(--primary);">ssc tsiakhe</h2>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pin" placeholder="PIN">
            <button class="btn" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <div class="card">
            <input type="text" id="busqueda" placeholder="¿A dónde vas?" oninput="filtrar(this.value)">
            <button id="mic-btn" onclick="iniciarVoz()">🎤</button>
        </div>
        <div id="resultados"></div>
        
        <div style="padding: 15px;">
            <button id="admin-btn" class="btn hidden" style="background:#0288d1; margin-bottom:10px;" onclick="toggleAdmin(true)">⚙️ PANEL CONTROL</button>
            <button class="btn btn-logout" onclick="logout()">CERRAR SESIÓN</button>
        </div>
    </div>

    <div id="admin-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; padding:20px; overflow-y:auto; box-sizing:border-box;">
        <button class="btn" onclick="toggleAdmin(false)" style="background:#666;">VOLVER</button>
        <h3>Rutas y Precios</h3>
        <input type="text" id="new-dest" placeholder="Nombre Destino">
        <input type="text" id="new-price" placeholder="Precio (Ej: $150)">
        <button class="btn" onclick="guardarRuta()">GUARDAR / ACTUALIZAR</button>
        <hr>
        <h3>Choferes</h3>
        <input type="text" id="new-chofer" placeholder="Usuario">
        <input type="password" id="new-chofer-pin" placeholder="PIN">
        <button class="btn" onclick="guardarChofer()" style="background:#444;">AGREGAR CHOFER</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDKdDduhDRFsdNOiAejQBxxKN-HLv_Jd0A",
        authDomain: "otimac-277ef.firebaseapp.com",
        databaseURL: "https://otimac-277ef-default-rtdb.firebaseio.com",
        projectId: "otimac-277ef",
        storageBucket: "otimac-277ef.firebasestorage.app",
        messagingSenderId: "20000838532",
        appId: "1:20000838532:web:5f5c2d76abd78d7f2a03d1"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let DATOS = {rutas:{}, usuarios:{}};
    let isAdmin = false;

    // QUITAR ACENTOS
    const normalizar = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();

    // ESTADO DE RED
    function checkNet() {
        const s = document.getElementById('status-bar');
        if(navigator.onLine) { s.className="online"; s.innerText="● CONECTADO (TIEMPO REAL)"; }
        else { s.className="offline"; s.innerText="○ MODO OFFLINE (USANDO MEMORIA LOCAL)"; }
    }
    window.addEventListener('online', checkNet);
    window.addEventListener('offline', checkNet);
    checkNet();

    // SINCRONIZACIÓN Y SESIÓN PERSISTENTE
    db.ref('/').on('value', (snap) => {
        DATOS = snap.val() || {rutas:{}, usuarios:{}};
        localStorage.setItem('otimac_cache', JSON.stringify(DATOS));
        if(localStorage.getItem('sesion_otimac')) login(true);
    });

    function login(auto = false) {
        const u = auto ? localStorage.getItem('sesion_otimac') : document.getElementById('user').value.toLowerCase().trim();
        const p = auto ? localStorage.getItem('pin_otimac') : document.getElementById('pin').value.trim();
        
        const usuarios = Object.values(DATOS.usuarios || {});
        isAdmin = (u === "warclib" && p === "0000");
        const esChofer = usuarios.find(x => x.u === u && x.p === p);

        if (isAdmin || esChofer) {
            localStorage.setItem('sesion_otimac', u);
            localStorage.setItem('pin_otimac', p);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            if(isAdmin) document.getElementById('admin-btn').classList.remove('hidden');
            filtrar('');
        } else if(!auto) { alert("Datos incorrectos"); }
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    function filtrar(term) {
        const t = normalizar(term);
        const res = document.getElementById('resultados');
        res.innerHTML = "";
        
        Object.keys(DATOS.rutas || {}).forEach(key => {
            const r = DATOS.rutas[key];
            if(normalizar(r.d).includes(t)) {
                res.innerHTML += `
                    <div class="res-item">
                        <div>
                            <div style="font-weight:bold">${r.d}</div>
                            ${isAdmin ? `
                                <button class="btn-opt" style="background:#666" onclick="prepararEdicion('${key}','${r.d}','${r.p}')">EDITAR</button>
                                <button class="btn-opt" style="background:var(--red)" onclick="borrarRuta('${key}')">BORRAR</button>
                            ` : ''}
                        </div>
                        <div class="price">${r.p}</div>
                    </div>`;
            }
        });
    }

    function iniciarVoz() {
        const btn = document.getElementById('mic-btn');
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-MX';
        rec.onstart = () => btn.classList.add('escuchando');
        rec.onend = () => btn.classList.remove('escuchando');
        rec.onresult = (e) => {
            let texto = e.results[0][0].transcript;
            if(normalizar(texto).includes("crust")) texto = "Cruzto";
            document.getElementById('busqueda').value = texto;
            filtrar(texto);
        };
        rec.start();
    }

    // FUNCIONES ADMIN
    function toggleAdmin(s) { document.getElementById('admin-modal').classList.toggle('hidden', !s); }
    function prepararEdicion(id, d, p) { 
        document.getElementById('new-dest').value = d; 
        document.getElementById('new-price').value = p; 
        toggleAdmin(true); 
    }
    function borrarRuta(id) { if(confirm("¿Borrar?")) db.ref('rutas/'+id).remove(); }
    function guardarRuta() {
        const d = document.getElementById('new-dest').value.toUpperCase().trim();
        const p = document.getElementById('new-price').value.trim();
        if(d && p) {
            const id = d.replace(/[^A-Z0-9]/g, "_");
            db.ref('rutas/'+id).set({d, p}).then(() => { toggleAdmin(false); alert("¡Guardado!"); });
        }
    }
    function guardarChofer() {
        const u = document.getElementById('new-chofer').value.toLowerCase().trim();
        const p = document.getElementById('new-chofer-pin').value.trim();
        if(u && p) db.ref('usuarios/'+u).set({u, p}).then(() => alert("Chofer listo"));
    }
</script>
</body>
</html>
